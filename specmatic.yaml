---
# =============================================================================
# Specmatic Configuration — Interactive Story API
# Docs: https://specmatic.io
# =============================================================================
version: 3

# -----------------------------------------------------------------------------
# System Under Test — contract tests run against your live backend
# -----------------------------------------------------------------------------
systemUnderTest:
  service:
    $ref: "#/components/services/interactiveStoryAPI"
  runOptions:
    $ref: "#/components/runOptions/testProfile"

# -----------------------------------------------------------------------------
# Dependencies — mock/stub server for frontend-first development
# -----------------------------------------------------------------------------
dependencies:
  services:
    - service:
        $ref: "#/components/services/interactiveStoryAPI"
      runOptions:
        $ref: "#/components/runOptions/mockProfile"

# -----------------------------------------------------------------------------
# Reusable Components
# -----------------------------------------------------------------------------
components:
  sources:
    localFilesystem:
      filesystem:
        directory: "."

  services:
    interactiveStoryAPI:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - api_spec.yaml

  runOptions:
    testProfile:
      openapi:
        type: test
        host: localhost
        port: 8000
    mockProfile:
      openapi:
        type: mock
        host: 0.0.0.0
        port: 9000